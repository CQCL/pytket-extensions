name: Build and test

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - develop
      - 'wheel/**'
      - alec-test-websockets
  release:
    types:
      - created
      - edited

env:
  IQSHARP_TELEMETRY_OPT_OUT: 1

jobs:

  macos:
    if: github.event_name != 'release'
    name: Build and test (MacOS)
    runs-on: macos-10.15

    steps:

    - uses: actions/checkout@v2
      with:
        fetch-depth: '0'
    - run: git fetch --depth=1 origin +refs/tags/*:refs/tags/* +refs/heads/*:refs/remotes/origin/*
    - name: Initialize modules list
      run: |
        cd ${GITHUB_WORKSPACE}/modules
        LS_MODULES=`ls -d */`
        ALL_MODULES=`echo ${LS_MODULES} | sed -e 's/\///g'`
        echo "MODULES_TO_TEST=pytket-honeywell" >> $GITHUB_ENV

    - name: Set up Python 3.8
      if: github.event_name == 'push'
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
    - name: Build and test (3.8) + mypy
      if: github.event_name == 'push'
      run: |
        ./.github/workflows/build-test mypy
